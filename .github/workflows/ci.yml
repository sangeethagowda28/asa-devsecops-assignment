name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  test-notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install
        working-directory: notify

      - name: Run tests
        run: npm test
        working-directory: notify


  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run SAST (Bandit)
        run: |
          bandit -r app/ -f json -o reports/sast.bandit.json --severity-level medium || true

      - name: Fail on critical findings
        run: |
          python -c "
          import json, sys
          with open('reports/sast.bandit.json') as f:
              data = json.load(f)
          high = [r for r in data.get('results', []) if r['issue_severity'] == 'HIGH' and r['issue_confidence'] == 'HIGH']
          if high:
              print(f'SAST: {len(high)} high-confidence HIGH severity findings')
              sys.exit(1)
          print('SAST: no blocking findings')
          "

      - name: Upload SAST report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast.bandit.json
          path: reports/sast.bandit.json

  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run SCA (pip-audit)
        run: |
          pip install -r requirements.txt
          pip-audit --requirement requirements.txt -f json -o reports/sca.pip-audit.json || true

      - name: Fail on critical or high CVEs
        run: |
          python -c "
          import json, sys
          with open('reports/sca.pip-audit.json') as f:
              data = json.load(f)
          critical = []
          for dep in data.get('dependencies', []):
              for vuln in dep.get('vulns', []):
                  fix = vuln.get('fix_versions', [])
                  critical.append((dep['name'], vuln['id'], fix))
          if critical:
              for name, vid, fix in critical:
                  print(f'  {name}: {vid} (fix: {fix})')
              sys.exit(1)
          print('SCA: no known vulnerabilities with fixes available')
          "

      - name: Upload SCA report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca.pip-audit.json
          path: reports/sca.pip-audit.json

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t vulntracker:ci .

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vulntracker:ci
          format: json
          output: reports/container.trivy.json
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload container scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: container.trivy.json
          path: reports/container.trivy.json

  iac-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov IaC scan (Helm)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: helm
          framework: helm
          output_format: json
          output_file_path: reports/
          soft_fail: true

      - name: Upload IaC scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iac.checkov.json
          path: reports/results_json.json

